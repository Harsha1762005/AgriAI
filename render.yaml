services:
  - type: web
    name: agriai-backend
    env: node
    repo: https://github.com/Harsha1762005/AgriAI.git
    branch: main
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: agriai-ml-service
          property: host
  - type: static
    name: agriai-frontend
    repo: https://github.com/Harsha1762005/AgriAI.git
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: agriai-backend
          property: host
  - type: web
    name: agriai-ml-service
    env: python
    repo: https://github.com/Harsha1762005/AgriAI.git
    branch: main
    buildCommand: cd ml-service && python -m pip install -r requirements.txt
    startCommand: cd ml-service && python app.py
    envVars:
      - key: PORT
        value: 5001
