services:
  - type: web
    name: agriai-backend
    runtime: node
    plan: free
    repo: https://github.com/Harsha1762005/AgriAI.git
    branch: main
    buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: agriai-ml-service
          property: host
      - key: NODE_VERSION
        value: 20
  - type: web
    name: agriai-frontend
    runtime: static
    repo: https://github.com/Harsha1762005/AgriAI.git
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://agriai-backend.onrender.com
      - key: NODE_VERSION
        value: 20
  - type: web
    name: agriai-ml-service
    runtime: python
    plan: free
    repo: https://github.com/Harsha1762005/AgriAI.git
    branch: main
    buildCommand: cd ml-service && python -m pip install -r requirements.txt
    startCommand: cd ml-service && python app.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5001
      - key: PYTHON_VERSION
        value: 3.11.9
